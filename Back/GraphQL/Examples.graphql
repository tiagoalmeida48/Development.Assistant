# Exemplos de Queries GraphQL para Development Assistant

# 1. Obter tipos de banco de dados suportados
query GetDatabaseTypes {
  databaseTypes
}

# 2. Listar tabelas de um banco de dados
query GetTables {
  getTables(
    connectionString: "Server=localhost;Database=mydb;User=user;Password=pass;"
    dbType: SQL_SERVER
  )
}

# 3. Comparar dois bancos de dados
query CompareDatabases {
  compareDatabases(
    connectionString1: "Server=localhost;Database=db1;User=user;Password=pass;"
    connectionString2: "Server=localhost;Database=db2;User=user;Password=pass;"
    dbType: SQL_SERVER
  ) {
    database1
    database2
    differentTables {
      database
      table
      totalRegisters
      columns {
        name
        type
        isPrimaryKey
        isIdentity
        isNullable
      }
    }
    differentRegisters {
      table
      totalRegisters1
      totalRegisters2
    }
  }
}

# 4. Mutation: Gerar classes POCO
mutation CreatePocoClass {
  createPocoClass(
    input: {
      connectionString: "Server=localhost;Database=mydb;User=user;Password=pass;"
      dbType: SQL_SERVER
      tables: ["users", "products", "orders"]
      pathGeral: "C:\\Projects\\Output"
      projectName: "MyProject"
      nameSpace: ".Core"
    }
  ) {
    success
    message
  }
}

# 5. Mutation: Copiar projeto
mutation CopyProject {
  copyProject(
    sourceProjectPath: "C:\\Projects\\Source"
    destinationProjectPath: "C:\\Projects\\Destination"
    oldNamespace: "OldProject"
    newNamespace: "NewProject"
  ) {
    success
    message
  }
}

# 6. Exemplo completo de comparação com MySQL
query CompareMySQLDatabases {
  compareDatabases(
    connectionString1: "Server=localhost;Database=production;Uid=root;Pwd=pass;"
    connectionString2: "Server=localhost;Database=development;Uid=root;Pwd=pass;"
    dbType: MY_SQL
  ) {
    database1
    database2
    differentTables {
      database
      table
      totalRegisters
      columns {
        name
        type
        isPrimaryKey
        isIdentity
        isNullable
      }
    }
    differentRegisters {
      table
      totalRegisters1
      totalRegisters2
    }
  }
}
